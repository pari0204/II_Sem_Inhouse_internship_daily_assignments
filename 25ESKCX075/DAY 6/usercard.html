<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>User Card Grid</title>

    <!-- Bootstrap CSS -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- jQuery -->

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>

        body{

            background-color:#f8f9fa;

        }

        .card{

            transition:0.3s;

        }

        .card:hover{

            transform:translateY(-5px);

            box-shadow:0 8px 20px rgba(0,0,0,0.2);

        }

        .card img{

            height:180px;

            object-fit:cover;

        }

    </style>

</head>

<body>

<div class="container mt-5">

    <h1 class="text-center mb-4">User Card Grid</h1>

    <h4 id="count" class="text-center text-primary mb-4"></h4>

    <div class="row" id="user-container"></div>

</div>

<script>

$(document).ready(function(){

    $.get("https://jsonplaceholder.typicode.com/users", function(data){

        $("#count").text(`Showing ${data.length} users`);

        data.forEach(function(user,index){

            const bg = index % 2 === 0 ? "bg-info-subtle" : "";

            const card = `

                <div class="col-md-4 mb-4">

                    <div class="card ${bg} h-100">

                        <img src="https://i.pravatar.cc/150?img=${user.id}" class="card-img-top" alt="User">

                        <div class="card-body">

                            <h5 class="card-title">${user.name}</h5>

                            <p class="card-text">

                                <strong>Email:</strong><br>

                                ${user.email}

                            </p>

                            <p class="card-text">

                                <strong>Company:</strong><br>

                                ${user.company.name}

                            </p>

                        </div>

                    </div>

                </div>

            `;

            $("#user-container").append(card);

        });

    });

});

</script>

</body>

</html>
